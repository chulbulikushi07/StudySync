        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav mx-auto">

<!-- NAVBAR ENDS -->

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">Pomodoro Timer</h1>
        <p class="text-muted">Stay focused. Study smarter.</p>
    </div>
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm text-center p-5">
                <h5 class="text-muted mb-3">Focus Session</h5>
                <h1 class="display-1 fw-bold text-primary">
                    25:00
                </h1>
                <div class="d-flex justify-content-center gap-3 mt-4">
                    <button class="btn btn-success btn-lg">
                        <i class="bi bi-play-fill me-2"></i>
                        Start
                    </button>
                    <button class="btn btn-warning btn-lg text-white">
                        <i class="bi bi-pause-fill me-2"></i>
                        Pause
                    </button>
                    <button class="btn btn-danger btn-lg">
                        <i class="bi bi-arrow-clockwise me-2"></i>
                        Reset
                    </button>
                </div>
                <hr class="my-5">
                <div class="row text-center">
                    <div class="col">
                        <h3 class="fw-bold">8</h3>
                        <p class="text-muted mb-0">Sessions</p>
                    </div>
                    <div class="col">
                        <h3 class="fw-bold">4h</h3>
                        <p class="text-muted mb-0">Focused</p>
                    </div>
                    <div class="col">
                        <h3 class="fw-bold">12</h3>
                        <p class="text-muted mb-0">Breaks</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
